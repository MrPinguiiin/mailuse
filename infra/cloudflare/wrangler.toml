name = "mailuse-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
APP_DOMAIN = "yourdomain.com"
AUTO_CREATE_INBOX = "true"

[[d1_databases]]
binding = "DB"
database_name = "mailuse"
database_id = "your-d1-database-id"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "mailuse-emails"

# Email routing
# [email_routing]
# enabled = true
