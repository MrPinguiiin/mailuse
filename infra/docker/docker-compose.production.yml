services:
  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.44"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@${DOMAIN:-localhost}}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailuse
      POSTGRES_USER: mailuse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mailuse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minio} $${MINIO_ROOT_PASSWORD:-miniosecret};
      mc mb local/emails --ignore-existing;
      exit 0;
      "

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mailuse:${POSTGRES_PASSWORD:-mailuse}@postgres:5432/mailuse
      DOMAIN: ${DOMAIN:-localhost}
      APP_NAME: ${APP_NAME:-mailuse}
      EMAIL_TTL_SECONDS: ${EMAIL_TTL_SECONDS:-3600}
      APP_DOMAIN: ${DOMAIN:-localhost}
      API_PORT: 3000
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-https://inbox.${DOMAIN:-localhost},https://dashboard.${DOMAIN:-localhost}}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: emails
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      STORAGE_REGION: auto
      DEPLOY_MODE: docker
      AUTO_CREATE_INBOX: "true"
      APP_VERSION: ${APP_VERSION:-dev}
      UPDATER_URL: http://updater:3010
    labels:
      - traefik.enable=true
      - traefik.http.routers.mailuse-api.rule=Host(`api.${DOMAIN:-localhost}`)
      - traefik.http.routers.mailuse-api.entrypoints=websecure
      - traefik.http.routers.mailuse-api.tls=true
      - traefik.http.routers.mailuse-api.tls.certresolver=letsencrypt
      - traefik.http.services.mailuse-api.loadbalancer.server.port=3000
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  migrate:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: postgresql://mailuse:${POSTGRES_PASSWORD:-mailuse}@postgres:5432/mailuse
      DOMAIN: ${DOMAIN:-localhost}
      APP_NAME: ${APP_NAME:-mailuse}
      EMAIL_TTL_SECONDS: ${EMAIL_TTL_SECONDS:-3600}
      APP_DOMAIN: ${DOMAIN:-localhost}
      API_PORT: 3000
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-https://inbox.${DOMAIN:-localhost},https://dashboard.${DOMAIN:-localhost}}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: emails
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      STORAGE_REGION: auto
      DEPLOY_MODE: docker
      AUTO_CREATE_INBOX: "true"
      APP_VERSION: ${APP_VERSION:-dev}
      UPDATER_URL: http://updater:3010
    command: ["sh", "-c", "cd /app/packages/db && bun run db:deploy"]
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      PUBLIC_API_BASE: ${PUBLIC_API_BASE:-https://api.${DOMAIN:-localhost}}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.${DOMAIN:-localhost}}
      PUBLIC_APP_DOMAIN: ${DOMAIN:-localhost}
      PUBLIC_EMAIL_DOMAIN: ${DOMAIN:-localhost}
      PUBLIC_APP_NAME: ${APP_NAME:-mailuse}
    labels:
      - traefik.enable=true
      - traefik.http.routers.mailuse-web.rule=Host(`inbox.${DOMAIN:-localhost}`)
      - traefik.http.routers.mailuse-web.entrypoints=websecure
      - traefik.http.routers.mailuse-web.tls=true
      - traefik.http.routers.mailuse-web.tls.certresolver=letsencrypt
      - traefik.http.services.mailuse-web.loadbalancer.server.port=3000
      - traefik.http.routers.mailuse-dashboard.rule=Host(`dashboard.${DOMAIN:-localhost}`)
      - traefik.http.routers.mailuse-dashboard.entrypoints=websecure
      - traefik.http.routers.mailuse-dashboard.tls=true
      - traefik.http.routers.mailuse-dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.mailuse-dashboard.service=mailuse-web
    depends_on:
      - api

  smtp:
    build:
      context: ../../
      dockerfile: apps/smtp/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mailuse:${POSTGRES_PASSWORD:-mailuse}@postgres:5432/mailuse
      DOMAIN: ${DOMAIN:-localhost}
      APP_NAME: ${APP_NAME:-mailuse}
      EMAIL_TTL_SECONDS: ${EMAIL_TTL_SECONDS:-3600}
      APP_DOMAIN: ${DOMAIN:-localhost}
      SMTP_DOMAIN: ${DOMAIN:-localhost}
      SMTP_PORT: 25
      NODE_ENV: production
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: emails
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      STORAGE_REGION: auto
      DEPLOY_MODE: docker
      AUTO_CREATE_INBOX: "true"
    ports:
      - "25:25"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  updater:
    build:
      context: https://github.com/MrPinguiiin/mailuse.git#main
      dockerfile: apps/updater/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mailuse:${POSTGRES_PASSWORD:-mailuse}@postgres:5432/mailuse
      DOMAIN: ${DOMAIN:-localhost}
      APP_DOMAIN: ${DOMAIN:-localhost}
      APP_NAME: ${APP_NAME:-mailuse}
      APP_VERSION: ${APP_VERSION:-dev}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@${DOMAIN:-localhost}}
      UPDATE_BACKUP_RETENTION_DAYS: ${UPDATE_BACKUP_RETENTION_DAYS:-3}
      UPDATE_RATE_LIMIT_MINUTES: ${UPDATE_RATE_LIMIT_MINUTES:-5}
      INSTALL_DIR: /root/mailuse-install
      BACKUP_DIR: /app/backups
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/root/mailuse-install
      - update_backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  letsencrypt_data:
  update_backups:
