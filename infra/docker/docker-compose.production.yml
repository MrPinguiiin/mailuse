version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailuse
      POSTGRES_USER: mailuse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mailuse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minio} $${MINIO_ROOT_PASSWORD:-miniosecret};
      mc mb local/emails --ignore-existing;
      exit 0;
      "

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mailuse:${POSTGRES_PASSWORD:-mailuse}@postgres:5432/mailuse
      DOMAIN: ${DOMAIN:-localhost}
      APP_NAME: ${APP_NAME:-mailuse}
      EMAIL_TTL_SECONDS: ${EMAIL_TTL_SECONDS:-3600}
      APP_DOMAIN: ${DOMAIN:-localhost}
      API_PORT: 3000
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: emails
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      STORAGE_REGION: auto
      DEPLOY_MODE: docker
      AUTO_CREATE_INBOX: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://localhost:3000}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3000}
      PUBLIC_APP_DOMAIN: ${DOMAIN:-localhost}
      PUBLIC_EMAIL_DOMAIN: ${DOMAIN:-localhost}
      PUBLIC_APP_NAME: ${APP_NAME:-mailuse}
    ports:
      - "5173:3000"
    depends_on:
      - api

  smtp:
    build:
      context: ../../
      dockerfile: apps/smtp/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mailuse:${POSTGRES_PASSWORD:-mailuse}@postgres:5432/mailuse
      DOMAIN: ${DOMAIN:-localhost}
      APP_NAME: ${APP_NAME:-mailuse}
      EMAIL_TTL_SECONDS: ${EMAIL_TTL_SECONDS:-3600}
      APP_DOMAIN: ${DOMAIN:-localhost}
      SMTP_DOMAIN: ${DOMAIN:-localhost}
      SMTP_PORT: 25
      NODE_ENV: production
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: emails
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      STORAGE_REGION: auto
      DEPLOY_MODE: docker
      AUTO_CREATE_INBOX: "true"
    ports:
      - "25:25"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
